name: Flutter CI/CD

on:
  push:
    branches: [main, master]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'

      - run: flutter pub get

      - name: Bump version code
        run: |
          CURRENT=$(grep -oP 'versionCode = \K[0-9]+' android/app/build.gradle.kts)
          NEW_CODE=$((CURRENT + 1))
          sed -i "s/versionCode = $CURRENT/versionCode = $NEW_CODE/" android/app/build.gradle.kts
          echo "Bumped versionCode $CURRENT -> $NEW_CODE"

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add android/app/build.gradle.kts
          git commit -m "chore: bump version code [skip ci]" || echo "No changes"
          git push

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release-keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=release-keystore.jks" >> android/key.properties

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Build APK
        run: flutter build apk --release

      - name: Deploy to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.myattendance.monteage
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: production
          status: completed

      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk